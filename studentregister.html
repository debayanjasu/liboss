<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Register</title>
    <link rel="stylesheet" href="registerstyle.css">  
</head>
<body>
        <div class="container">
            <div class="main">
                <div class="content">
                    <h2>Student Registration</h2>
                    <form action="/generate_pdf" method="post">
                        <input type="text" name="name" placeholder="Name" required autofocus="">
                        <input type="text" pattern="[A-Za-z0-9]+" placeholder="Roll No." required autofocus="">
                        <input type="email" name="email" placeholder="Email Id" required autofocus="">
                        <input type="tel" pattern="[0-9]{10}" placeholder="Mobile No." required >
                        <textarea placeholder="Address"></textarea>
                        <select name="Batch" required>
                            <option value="">Batch</option>
                            <option>B-tech</option>
                            <option>Diploma</option>
                            <option>Law</option>
                            <option>BBA</option>
                            <option>MBA</option>
                            <option>BCA</option>
                            <option>Nursing</option>
                        </select>
                        <select name="Department" required>
                            <option value="">Department</option>
                            <option>CST</option>
                            <option>ECE</option>
                            <option>ME</option>
                            <option>CE</option>
                        </select>
                        <select name="Semester" required>
                            <option value="">Semester</option>
                            <option>1</option>
                            <option>2</option>
                            <option>3</option>
                            <option>4</option>
                            <option>5</option>
                            <option>6</option>
                            <option>7</option>
                            <option>8</option>
                            <option>9</option>
                            <option>10</option>
                        </select>
                        <input type="number" name="max_books" placeholder="Max Book" required autofocus="">
                        <button type="submit">
                            Register
                        </button>
                    </form>
                </div>
            </div>
        </div>
</body>
</html>
